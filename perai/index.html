<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="container">

    <!-- LADO ESQUERDO -->
    <div class="form-image">
        <img src="assets/img/undraw_shopping_re_3wst.svg" alt="Ilustração de compras">
    </div>

    <!-- LADO DIREITO -->
    <div class="form">

        <!-- FUNDO DECORATIVO -->
        <div class="stars"></div>
        <div class="moon">
            <div class="rays">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
            </div>
        </div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <!-- cloud adjacent to moon -->
        <div class="cloud cloud3"></div>

        <!-- FORMULÁRIO -->
        <form>

            <div class="form-header">
                <div class="title">
                    <h1>Cadastre-se</h1>
                </div>

                <div class="login-button">
                    <!-- link estilizado como botão para login -->
                    <a href="#" class="login-link">Entrar</a>
                </div>
            </div>

            <div class="input-group">

                <div class="input-box">
                    <label for="firstname">Primeiro Nome</label>
                    <input id="firstname" type="text" placeholder="Digite seu primeiro nome">
                </div>

                <div class="input-box">
                    <label for="lastname">Sobrenome</label>
                    <input id="lastname" type="text" placeholder="Digite seu sobrenome">
                </div>

                <div class="input-box">
                    <label for="email">E-mail</label>
                    <input id="email" type="email" placeholder="Digite seu e-mail">
                </div>

                <div class="input-box">
                    <label for="number">Celular</label>
                    <input id="number" type="tel" placeholder="(xx) xxxx-xxxx">
                </div>

                <div class="input-box">
                    <label for="password">Senha</label>
                    <input id="password" type="password" placeholder="Digite sua senha">
                </div>

                <div class="input-box">
                    <label for="confirmpassword">Confirmar Senha</label>
                    <input id="confirmpassword" type="password" placeholder="Confirme sua senha">
                </div>

            </div>

            <div class="gender-inputs">
                <div class="gender-title">
                    <h6>Gênero</h6>
                </div>

                <div class="gender-group">
                    <div class="gender-input">
                        <input id="female" type="radio" name="gender" value="female">
                        <label for="female">Feminino</label>
                    </div>

                    <div class="gender-input">
                        <input id="male" type="radio" name="gender" value="male">
                        <label for="male">Masculino</label>
                    </div>

                    <div class="gender-input">
                        <input id="others" type="radio" name="gender" value="others">
                        <label for="others">Outros</label>
                    </div>
                </div>
            </div>

            <div class="continue-button">
                <button type="submit">Continuar</button>
            </div>

        </form>

    </div>

</div>

<script>
    // alterna entre tema escuro e claro ao clicar na lua
    const moon = document.querySelector('.moon');
    if (moon) {
        moon.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            moon.classList.toggle('sun');
        });
    }
</script>

</body>
</html>
</html>
